name: e2e

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install

      - name: Install frontend dependencies
        run: cd frontend && bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run e2e tests
        # Full Playwright coverage. The four legacy specs (auth / episodes /
        # search / tracking) remain excluded — they are deemed flaky/redundant
        # per e2e/CLAUDE.md and have no Page Object equivalents.
        run: |
          bun run test:e2e --project=chromium \
            e2e/passkey.spec.ts \
            e2e/oidc.spec.ts \
            e2e/calendar-feed.spec.ts \
            e2e/notifications.spec.ts \
            e2e/achievements.spec.ts \
            e2e/admin-users.spec.ts \
            e2e/browse.spec.ts \
            e2e/calendar.spec.ts \
            e2e/discovery.spec.ts \
            e2e/home.spec.ts \
            e2e/invite-accept.spec.ts \
            e2e/kiosk.spec.ts \
            e2e/leaderboard.spec.ts \
            e2e/more.spec.ts \
            e2e/person.spec.ts \
            e2e/profile.spec.ts \
            e2e/recommendations.spec.ts \
            e2e/reels.spec.ts \
            e2e/season-detail.spec.ts \
            e2e/settings-account.spec.ts \
            e2e/settings-admin.spec.ts \
            e2e/settings-appearance.spec.ts \
            e2e/settings-integrations.spec.ts \
            e2e/settings-notifications.spec.ts \
            e2e/settings-subscriptions.spec.ts \
            e2e/shared-watchlist.spec.ts \
            e2e/signup.spec.ts \
            e2e/stats.spec.ts \
            e2e/title-detail.spec.ts \
            e2e/up-next.spec.ts \
            e2e/user-overlap.spec.ts \
            e2e/watched-ratings.spec.ts
        env:
          CI: "1"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/

  triage:
    needs: e2e
    if: always() && needs.e2e.result == 'failure' && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
      actions: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Download Playwright artifact
        uses: actions/download-artifact@v8
        with:
          name: playwright-report
          path: e2e-artifacts/

      - name: Ensure e2e-failure label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create e2e-failure \
            --color B60205 \
            --description "Auto-filed e2e test failure" || true

      - name: Triage with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: >-
            --allowed-tools "Bash(gh *),Read,Glob,Grep"
          prompt: |
            The nightly e2e workflow failed (run ${{ github.run_id }}, ref ${{ github.ref }}).
            Artifacts are downloaded under ./e2e-artifacts/. Job logs are available via
            `gh run view ${{ github.run_id }} --log-failed`.

            Your job:
            1. Identify each failing test (spec file + test name) and a one-line
               cause from the error message. Prefer reading the gh logs over the
               artifact for the actual error text; use the artifact for screenshots
               and trace context if needed.
            2. For each failure, build a stable signature: `<spec-file>::<test-name>`.
            3. Look for existing open issues with label `e2e-failure` via
               `gh issue list --label e2e-failure --state open --json number,title,body`.
               If a signature already matches an open issue, add a comment with
               a link to this run (https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
               and the latest error excerpt.
            4. If no match, file a new issue:
               - title: `[e2e] <spec>::<test name> failing`
               - labels: e2e-failure
               - body: link to this run, the failing assertion / error excerpt,
                 and a note that this was auto-filed by the nightly triage.
            5. Do not modify any code; this is a read-and-file job only.
