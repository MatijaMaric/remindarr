name: Lighthouse

on:
  schedule:
    # 1st and 15th of every month at 06:00 UTC — approximately every two weeks.
    - cron: "0 6 1,15 * *"
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            frontend/node_modules
            frontend/node_modules/.tmp
          key: ${{ runner.os }}-bun-frontend-${{ hashFiles('bun.lock', 'frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-frontend-

      - name: Install dependencies
        run: bun install

      - name: Install frontend dependencies
        run: cd frontend && bun install

      - name: Build frontend
        run: bun run build

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Run Lighthouse CI
        run: bun run scripts/lighthouse-ci.ts
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          BETTER_AUTH_SECRET: lighthouse-ci-secret

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          if-no-files-found: ignore
          include-hidden-files: true
