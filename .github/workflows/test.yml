name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  merge_group:
    branches: [master]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
              - 'drizzle/**'
              - 'package.json'
              - 'tsconfig.json'
              - 'bunfig.toml'
              - 'bun.lock'
              - '.github/workflows/**'
            frontend:
              - 'frontend/**'
              - 'scripts/**'
              - 'lighthouserc.cjs'
              - 'package.json'
              - 'bunfig.toml'
              - 'bun.lock'
              - '.github/workflows/**'

  server:
    needs: detect
    if: github.event_name == 'merge_group' || github.event_name == 'push' || needs.detect.outputs.server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            .tsbuildinfo
          key: ${{ runner.os }}-bun-server-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-server-

      - name: Install dependencies
        run: bun install

      - name: Type check (server)
        run: bunx tsc --noEmit

      - name: Run server tests
        run: bun run test:server

  frontend:
    needs: detect
    if: github.event_name == 'merge_group' || github.event_name == 'push' || needs.detect.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            frontend/node_modules
            frontend/node_modules/.tmp
          key: ${{ runner.os }}-bun-frontend-${{ hashFiles('bun.lock', 'frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-frontend-

      - name: Install dependencies
        run: bun install

      - name: Install frontend dependencies
        run: cd frontend && bun install

      - name: Type check (frontend)
        run: cd frontend && bunx tsc -b --noEmit

      - name: Lint (frontend)
        run: cd frontend && bun run lint

      - name: Run frontend tests
        run: bun run test:frontend

      - name: Build frontend
        run: cd frontend && bun run build

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Bundle size gate
        run: bunx wrangler deploy --dry-run --outdir .wrangler/dry-run && bun run check:bundle

  lighthouse:
    needs: detect
    if: github.event_name == 'merge_group' || github.event_name == 'push' || needs.detect.outputs.frontend == 'true' || needs.detect.outputs.server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            frontend/node_modules
            frontend/node_modules/.tmp
          key: ${{ runner.os }}-bun-frontend-${{ hashFiles('bun.lock', 'frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-frontend-

      - name: Install dependencies
        run: bun install

      - name: Install frontend dependencies
        run: cd frontend && bun install

      - name: Build frontend
        run: bun run build

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Lighthouse CI
        run: bun run scripts/lighthouse-ci.ts
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          BETTER_AUTH_SECRET: lighthouse-ci-secret

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          if-no-files-found: ignore

  all-passed:
    needs: [server, frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.server.result }}" == "failure" || "${{ needs.server.result }}" == "cancelled" ]]; then
            echo "server job failed or was cancelled"
            exit 1
          fi
          if [[ "${{ needs.frontend.result }}" == "failure" || "${{ needs.frontend.result }}" == "cancelled" ]]; then
            echo "frontend job failed or was cancelled"
            exit 1
          fi
          echo "All checks passed (or were skipped)"
