name: Update README

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new commits since last successful run
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LAST_SUCCESS=$(gh run list --workflow="update-readme.yml" --status=success --limit=1 --json updatedAt --jq '.[0].updatedAt // empty')
          if [ -z "$LAST_SUCCESS" ]; then
            echo "No previous successful run found — treating as new changes"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            NEW_COMMITS=$(git log --since="$LAST_SUCCESS" --oneline | head -1)
            if [ -n "$NEW_COMMITS" ]; then
              echo "New commits found since $LAST_SUCCESS"
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
            else
              echo "No new commits since $LAST_SUCCESS — skipping"
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  update-readme:
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Update README with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Read the entire codebase and the current README.md. Update the README.md
            to accurately reflect the current state of the project. Keep the existing
            style and structure but update any sections that are out of date —
            features, stack, configuration, project structure, API routes, etc.
            Only make changes if something is actually out of date. If you make
            changes, commit them with a clear message and then push to origin.
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(git diff:*)",
                  "Bash(git log:*)",
                  "Bash(git add:*)",
                  "Bash(git commit:*)",
                  "Bash(git push:*)",
                  "Read",
                  "Write",
                  "Glob",
                  "Grep",
                  "Edit"
                ]
              }
            }
