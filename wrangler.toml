name = "remindarr"
main = "server/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain
routes = [
  { pattern = "remindarr.app", custom_domain = true }
]

# Static frontend assets — binding required for SPA fallback in worker
[assets]
directory = "./frontend/dist"
binding = "ASSETS"
not_found_handling = "none"

# D1 SQLite database
# Apply migrations before deploying: wrangler d1 migrations apply remindarr --remote
[[d1_databases]]
binding = "DB"
database_name = "remindarr"
database_id = "b15b2224-6af6-4962-b1a8-7e51f771635c"
migrations_dir = "drizzle"

# KV namespace for distributed cache
# Create with: wrangler kv namespace create CACHE_KV
# Then update the id below with the returned namespace ID.
# [[kv_namespaces]]
# binding = "CACHE_KV"
# id = "<your-kv-namespace-id>"

# Non-secret config (override via wrangler.toml or dashboard)
[vars]
TMDB_COUNTRY = "HR"
TMDB_LANGUAGE = "en"
LOG_LEVEL = "info"

# Secrets (set via `wrangler secret put <NAME>`):
# TMDB_API_KEY
# BETTER_AUTH_SECRET
# OIDC_CLIENT_SECRET
# SENTRY_DSN
# VAPID_PUBLIC_KEY
# VAPID_PRIVATE_KEY
# VAPID_SUBJECT

# Observability — persist logs and traces for debugging
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

# Cron triggers for background jobs
[triggers]
crons = [
  "0 3 * * *",      # sync-titles
  "30 3 * * *",     # sync-episodes
  "*/5 * * * *",    # send-notifications (check every 5 min)
  "0 0 * * *",      # cleanup (expired sessions, old jobs)
]
