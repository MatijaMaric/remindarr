name = "remindarr"
main = "server/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain
routes = [
  { pattern = "remindarr.app", custom_domain = true },
  { pattern = "www.remindarr.app", custom_domain = true }
]

# Static frontend assets — binding required for SPA fallback in worker
[assets]
directory = "./frontend/dist"
binding = "ASSETS"
not_found_handling = "none"

# D1 SQLite database
# Apply migrations before deploying: wrangler d1 migrations apply remindarr --remote
[[d1_databases]]
binding = "DB"
database_name = "remindarr"
database_id = "b15b2224-6af6-4962-b1a8-7e51f771635c"
migrations_dir = "drizzle"

# KV namespace for distributed cache
[[kv_namespaces]]
binding = "CACHE_KV"
id = "c41afddb53d045738dc0ffd1b082b46b"

# Durable Object job queue — one instance per job name (or name:partitionKey)
# Feature-flagged: set JOB_QUEUE_BACKEND=durable-object to activate
[[durable_objects.bindings]]
name = "JOB_QUEUE_DO"
class_name = "JobQueueDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["JobQueueDO"]

# Non-secret config (override via wrangler.toml or dashboard)
[vars]
TMDB_COUNTRY = "HR"
TMDB_LANGUAGE = "en"
LOG_LEVEL = "info"
BASE_URL = "https://remindarr.app"

# Secrets (set via `wrangler secret put <NAME>`):
# TMDB_API_KEY
# BETTER_AUTH_SECRET
# OIDC_CLIENT_SECRET
# SENTRY_DSN
# VAPID_PUBLIC_KEY
# VAPID_PRIVATE_KEY
# VAPID_SUBJECT
# STREAMING_AVAILABILITY_API_KEY  (optional, enables deep links)

# Observability — persist logs and traces for debugging
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

# Cron triggers — bootstrap window only. Per-job sub-daily schedules
# (e.g. send-notifications every 5 min) live in CRON_JOBS in
# server/jobs/backend.ts and are driven by Durable Object alarms via
# @cloudflare/actors/alarms. This single daily tick arms every cron DO
# (idempotent), runs stale-job recovery, and enqueues one-time migrations.
[triggers]
crons = ["0 0 * * *"]
